# Release-Pipeline: laeuft bei jedem Git-Tag "v*" (z. B. v1.0.0).
#
# Erzeugt ein GitHub-Release mit:
#   - warngeraet-firmware.bin       Merged-Binary (Bootloader + Partitionstabelle
#                                   + boot_app0 + App), flashbar an Offset 0x0 --
#                                   genau das laedt der Warngeraet-Flasher
#   - Warngeraet-Flasher-*          fertige GUI-Apps (PyInstaller) fuer
#                                   macOS (Apple Silicon + Intel), Linux, Windows
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO + esptool
        run: pip install platformio "esptool>=4.7,<5"

      - name: Run native unit tests
        run: pio test -e native

      - name: Build firmware (EU868)
        run: pio run -e seeed_xiao_esp32s3

      - name: Create merged binary
        run: |
          B=.pio/build/seeed_xiao_esp32s3
          python -m esptool --chip esp32s3 merge_bin -o warngeraet-firmware.bin \
            0x0 "$B/bootloader.bin" \
            0x8000 "$B/partitions.bin" \
            0xe000 "$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin" \
            0x10000 "$B/firmware.bin"

      - name: Attach firmware to release
        uses: softprops/action-gh-release@v2
        with:
          files: warngeraet-firmware.bin
          generate_release_notes: true

  flasher:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon
            suffix: macos-apple-silicon
          - os: macos-13 # letzter Intel-Runner
            suffix: macos-intel
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: windows-latest
            suffix: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r flasher/requirements.txt pyinstaller

      - name: Smoke test (imports + port scan, no GUI)
        run: python flasher/flasher.py --check

      # --collect-data esptool: die Stub-Flasher-JSONs sind Paketdaten, die
      # PyInstaller nicht automatisch einsammelt -- ohne sie bricht
      # write_flash zur Laufzeit mit "Flasher stub data is missing" ab.
      - name: Build app
        run: pyinstaller --onefile --windowed --collect-data esptool --name Warngeraet-Flasher flasher/flasher.py

      - name: Package per OS
        shell: bash
        run: |
          case "${{ matrix.suffix }}" in
            macos-*)
              # --windowed erzeugt auf macOS ein .app-Bundle; als Zip anhaengen
              (cd dist && zip -qr "../Warngeraet-Flasher-${{ matrix.suffix }}.zip" Warngeraet-Flasher.app)
              ;;
            windows)
              cp dist/Warngeraet-Flasher.exe "Warngeraet-Flasher-${{ matrix.suffix }}.exe"
              ;;
            *)
              cp dist/Warngeraet-Flasher "Warngeraet-Flasher-${{ matrix.suffix }}"
              ;;
          esac

      - name: Attach app to release
        uses: softprops/action-gh-release@v2
        with:
          files: Warngeraet-Flasher-${{ matrix.suffix }}*
