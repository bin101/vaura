# Release pipeline: runs on every "v*" git tag (e.g. v1.0.0). Tags are
# normally created automatically by auto-tag.yml on every push to main; a
# maintainer can still push a tag by hand for a one-off release.
#
# Produces a GitHub release with:
#   - vaura-firmware.bin       Merged binary (bootloader + partition table +
#                              boot_app0 + app), flashable as-is at offset
#                              0x0 -- exactly what the Vaura Flasher loads
#   - Vaura-Flasher-*          ready-to-run GUI apps (PyInstaller) for
#                              macOS (Apple Silicon + Intel), Linux, Windows
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO + esptool
        run: pip install platformio "esptool>=4.7,<5"

      - name: Run native unit tests
        run: pio test -e native

      - name: Build firmware (EU868)
        run: pio run -e seeed_xiao_esp32s3

      - name: Create merged binary
        run: |
          B=.pio/build/seeed_xiao_esp32s3
          python -m esptool --chip esp32s3 merge_bin -o vaura-firmware.bin \
            0x0 "$B/bootloader.bin" \
            0x8000 "$B/partitions.bin" \
            0xe000 "$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin" \
            0x10000 "$B/firmware.bin"

      - name: Attach firmware to release
        uses: softprops/action-gh-release@v2
        with:
          files: vaura-firmware.bin
          generate_release_notes: true

  flasher:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon
            suffix: macos-apple-silicon
          - os: macos-13 # last Intel runner
            suffix: macos-intel
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: windows-latest
            suffix: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r flasher/requirements.txt pyinstaller

      - name: Smoke test (imports + port scan, no GUI)
        run: python flasher/flasher.py --check

      # --collect-data esptool: the stub-flasher JSONs are package data that
      # PyInstaller doesn't collect automatically -- without them write_flash
      # fails at runtime with "Flasher stub data is missing".
      # --collect-data certifi: same story for its cacert.pem CA bundle --
      # without it, the frozen app's download fails with
      # CERTIFICATE_VERIFY_FAILED.
      - name: Build app
        run: pyinstaller --onefile --windowed --collect-data esptool --collect-data certifi --name Vaura-Flasher flasher/flasher.py

      - name: Package per OS
        shell: bash
        run: |
          case "${{ matrix.suffix }}" in
            macos-*)
              # --windowed produces a .app bundle on macOS; zip it up for the release
              (cd dist && zip -qr "../Vaura-Flasher-${{ matrix.suffix }}.zip" Vaura-Flasher.app)
              ;;
            windows)
              cp dist/Vaura-Flasher.exe "Vaura-Flasher-${{ matrix.suffix }}.exe"
              ;;
            *)
              cp dist/Vaura-Flasher "Vaura-Flasher-${{ matrix.suffix }}"
              ;;
          esac

      - name: Attach app to release
        uses: softprops/action-gh-release@v2
        with:
          files: Vaura-Flasher-${{ matrix.suffix }}*
