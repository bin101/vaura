name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (EU868)
        run: pio run -e seeed_xiao_esp32s3

      - name: Run native unit tests
        run: pio test -e native

      - name: Install flasher test dependencies
        run: pip install -r flasher/requirements-dev.txt

      - name: Run flasher unit tests
        run: pytest flasher/test_flasher.py -v
