; PlatformIO project file for the club warning device
; Board: Seeed Studio XIAO ESP32-S3 + Wio-SX1262 (LoRa) + 0.96" SSD1306 OLED + INA219

[platformio]
; Plain `pio run` builds only the firmware; the native env exists solely for
; `pio test -e native` (it has no main() of its own).
default_envs = seeed_xiao_esp32s3

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; Unit tests run natively only (pio test -e native) -- nothing to run on-target.
test_ignore = *

lib_deps =
    jgromes/RadioLib@^6.6.0
    olikraus/U8g2@^2.35.19
    mathertel/OneButton@^2.6.1
    https://github.com/adafruit/Adafruit_INA219.git

build_flags =
    -D CORE_DEBUG_LEVEL=2
    ; EU868 by default -- do not change to a US915 build without also
    ; fitting a 915 MHz antenna. See README.md "Region" section.
    -D LORA_REGION_EU868=1

; Host-side unit tests (no hardware needed): pio test -e native
; Only the pure, Arduino-free modules are compiled in.
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<protocol.cpp> +<battery_curve.cpp>
